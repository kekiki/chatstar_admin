<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>APP管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <style>
        .sidebar {
            width: 240px;
            background: #212529;
            min-height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        .main-content {
            margin-left: 240px;
            padding: 20px;
        }
        .sidebar a {
            color: #adb5bd;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
        }
        .sidebar a.active {
            background: #0d6efd;
            color: white;
        }
    </style>
</head>
<body>
<!-- 左侧侧边栏 -->
<div class="sidebar">
    <div class="p-3 text-white fs-5 border-bottom border-secondary">APP管理后台</div>
    <a href="/admin/dashboard" class="{% if active_menu == 'dashboard' %}active{% endif %}">实时看板</a>
    <a href="/admin/user" class="{% if active_menu == 'user' %}active{% endif %}">用户列表</a>
    <a href="/admin/anchor" class="{% if active_menu == 'anchor' %}active{% endif %}">主播列表</a>
    <a href="/admin/order" class="{% if active_menu == 'order' %}active{% endif %}">订单列表</a>
    <a href="/admin/app_list" class="{% if active_menu == 'app_list' %}active{% endif %}">应用列表</a>
    <a href="/admin/app_config" class="{% if active_menu == 'app_config' %}active{% endif %}">应用配置</a>
    <a href="/admin/media" class="{% if active_menu == 'media' %}active{% endif %}">媒体管理</a>
    <div class="border-top border-secondary mt-3">
        <a href="/logout">退出登录</a>
    </div>
</div>

<!-- 右侧内容区域 -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>
</body>
</html>
