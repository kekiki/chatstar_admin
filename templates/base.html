<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>APP管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <style>
        .sidebar {
            width: 240px;
            background: #212529;
            min-height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        .main-content {
            margin-left: 240px;
            padding: 20px;
        }
        .sidebar a {
            color: #adb5bd;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
        }
        .sidebar a.active {
            background: #0d6efd;
            color: white;
        }
        .compact-table {
            font-size: 0.82rem;
        }
        .compact-table th,
        .compact-table td {
            white-space: nowrap;
            vertical-align: middle;
            padding: 0.45rem 0.55rem;
        }
        .compact-table .ellipsis-cell {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .compact-table .small-cell {
            max-width: 90px;
        }
        .compact-table .avatar-thumb img,
        .compact-table .cover-thumb img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .compact-table .cover-thumb img {
            border-radius: 0;
        }
        .compact-table .action-cell {
            min-width: 120px;
        }
        .compact-table td:last-child .btn-sm,
        .compact-table td:last-child .btn {
            padding: 0.18rem 0.35rem;
            font-size: 0.72rem;
            line-height: 1.1;
        }
        .compact-table td:last-child .btn + .btn {
            margin-left: 0.2rem;
        }
    </style>
</head>
<body>
<!-- 左侧侧边栏 -->
<div class="sidebar">
    <div class="p-3 text-white fs-5 border-bottom border-secondary">APP管理后台</div>
    <a href="/admin/dashboard" class="{% if active_menu == 'dashboard' %}active{% endif %}">实时看板</a>
    <a href="/admin/user" class="{% if active_menu == 'user' %}active{% endif %}">用户列表</a>
    <a href="/admin/anchor" class="{% if active_menu == 'anchor' %}active{% endif %}">主播列表</a>
    <a href="/admin/order" class="{% if active_menu == 'order' %}active{% endif %}">订单列表</a>
    <a href="/admin/app_list" class="{% if active_menu == 'app_list' %}active{% endif %}">应用列表</a>
    <a href="/admin/app_review" class="{% if active_menu == 'app_review' %}active{% endif %}">审核配置</a>
    <a href="/admin/media" class="{% if active_menu == 'media' %}active{% endif %}">媒体管理</a>
    <div class="border-top border-secondary mt-3">
        <a href="/logout">退出登录</a>
    </div>
</div>

<!-- 右侧内容区域 -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>
</body>
</html>
