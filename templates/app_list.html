{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>应用列表</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addAppModal">新增应用</button>
</div>
<hr>
<div class="card mb-4">
    <div class="table-responsive">
        <table class="table table-hover table-striped mb-0 compact-table">
            <thead class="table-dark">
                <tr>
                    <th class="small-cell">应用ID</th>
                    <th class="ellipsis-cell">应用名称</th>
                    <th class="ellipsis-cell">包名</th>
                    <th class="small-cell">上架</th>
                    <th class="action-cell">操作</th>
                </tr>
            </thead>
            <tbody>
                {% for app in apps %}
                <tr>
                    <td>{{ app.id }}</td>
                    <td class="ellipsis-cell" title="{{ app.app_name }}">{{ app.app_name }}</td>
                    <td class="ellipsis-cell" title="{{ app.package_name }}">{{ app.package_name }}</td>
                    <td>
                        {% if app.is_online %}
                        <span class="badge bg-success">已上架</span>
                        {% else %}
                        <span class="badge bg-secondary">未上架</span>
                        {% endif %}
                    </td>
                    <td>
                        <button type="button" class="btn btn-sm btn-secondary btn-edit" data-id="{{ app.id }}" data-name="{{ app.app_name }}" data-package_name="{{ app.package_name }}" data-online="{{ 'true' if app.is_online else 'false' }}">编辑</button>
                        <button type="button" class="btn btn-sm btn-danger btn-delete" data-id="{{ app.id }}">删除</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- 新增应用弹窗 -->
<div class="modal fade" id="addAppModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">新增APP应用</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addAppForm">
                    <div class="mb-3">
                        <label>应用名称</label>
                        <input type="text" name="app_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>包名（唯一标识）</label>
                        <input type="text" name="package_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <p><label>上架状态</label></p>
                        <label class="radio-item">
                            <input type="radio" name="is_online" value="true" checked>
                            <span>已上架</span>
                        </label>
                        &emsp;
                        <label class="radio-item">
                            <input type="radio" name="is_online" value="false">
                            <span>未上架</span>
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-success" id="submitAddApp">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 编辑应用弹窗 -->
<div class="modal fade" id="editAppModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑APP应用</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editAppForm">
                    <input type="hidden" name="id">
                    <div class="mb-3">
                        <label>应用名称</label>
                        <input type="text" name="app_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>包名（唯一标识）</label>
                        <input type="text" name="package_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <p><label>上架状态</label></p>
                        <label class="radio-item">
                            <input type="radio" name="is_online" value="true">
                            <span>已上架</span>
                        </label>
                        &emsp;
                        <label class="radio-item">
                            <input type="radio" name="is_online" value="false">
                            <span>未上架</span>
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-success" id="submitEditApp">保存修改</button>
            </div>
        </div>
    </div>
</div>

<!-- 查看弹窗 -->
<div class="modal fade" id="configModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5>应用详情</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <pre id="configText"></pre>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// 查看弹窗
$(".view-config").click(function(){
    let cfg = $(this).data("config");
    $("#configText").text(JSON.stringify(JSON.parse(cfg), null, 2));
    new bootstrap.Modal("#configModal").show();
})

function openEditModal(app) {
    const modal = new bootstrap.Modal(document.getElementById('editAppModal'));
    const form = $("#editAppForm");
    form.find("[name=id]").val(app.id);
    form.find("[name=app_name]").val(app.app_name);
    form.find("[name=package_name]").val(app.package_name);
    form.find("[name=is_online][value=" + app.is_online + "]").prop("checked", true);
    modal.show();
}

// 编辑按钮
$(document).on('click', '.btn-edit', function(){
    const button = $(this);
    openEditModal({
        id: button.data('id'),
        app_name: button.data('name'),
        package_name: button.data('package_name'),
        is_online: button.data('online')
    });
});

// 删除应用
$(document).on('click', '.btn-delete', async function(){
    const id = $(this).data('id');
    if (!confirm('确认删除该应用吗？')) {
        return;
    }

    try {
        const res = await fetch(`/admin/api/delete_app_list?id=${id}`, {
            method: 'DELETE'
        });
        const data = await res.json();
        if (res.ok && data.code === 200) {
            alert(data.msg);
            location.reload();
        } else {
            alert(data.msg || '删除失败，请重试。');
        }
    } catch (error) {
        console.error(error);
        alert('删除失败，请稍后重试。');
    }
});

// 新增应用提交
$("#submitAddApp").click(async function(){
    const form = $("#addAppForm");
    const app_name = form.find("[name=app_name]").val();
    const package_name = form.find("[name=package_name]").val();
    const is_online = form.find("[name=is_online]:checked").val() === "true";

    if (!app_name || !package_name) {
        alert("请填写应用名称和包名。");
        return;
    }

    try {
        const res = await fetch("/admin/api/add_app_list", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({app_name, package_name, is_online})
        });
        const data = await res.json();
        if (res.ok && data.code === 200) {
            alert(data.msg);
            location.reload();
        } else {
            alert(data.msg || "保存失败，请检查输入。");
        }
    } catch (error) {
        console.error(error);
        alert("保存失败，请稍后重试。");
    }
});

// 编辑应用提交
$("#submitEditApp").click(async function(){
    const form = $("#editAppForm");
    const id = form.find("[name=id]").val();
    const app_name = form.find("[name=app_name]").val();
    const package_name = form.find("[name=package_name]").val();
    const is_online = form.find("[name=is_online]:checked").val() === "true";

    if (!id || !app_name || !package_name) {
        alert("请填写完整的应用信息。");
        return;
    }

    try {
        const res = await fetch("/admin/api/update_app_list", {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({id: Number(id), app_name, package_name, is_online})
        });
        const data = await res.json();
        if (res.ok && data.code === 200) {
            alert(data.msg);
            location.reload();
        } else {
            alert(data.msg || "更新失败，请检查输入。");
        }
    } catch (error) {
        console.error(error);
        alert("更新失败，请稍后重试。");
    }
});
</script>
{% endblock %}
