{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>应用列表</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addAppModal">新增应用</button>
</div>
<hr>
<div class="card mb-4">
    <div class="table-responsive">
        <table class="table table-hover table-striped mb-0">
            <thead class="table-dark">
                <tr>
                    <th>应用ID</th>
                    <th>应用名称</th>
                    <th>包名</th>
                    <th>上架状态</th>
                </tr>
            </thead>
            <tbody>
                {% for app in apps %}
                <tr>
                    <td>{{ app.id }}</td>
                    <td>{{ app.app_name }}</td>
                    <td>{{ app.bound_id }}</td>
                    <td>
                        {% if app.is_online %}
                        <span class="badge bg-success">已上架</span>
                        {% else %}
                        <span class="badge bg-secondary">未上架</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- 新增应用弹窗 -->
<div class="modal fade" id="addAppModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">新增APP应用</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addAppForm">
                    <div class="mb-3">
                        <label>应用名称</label>
                        <input type="text" name="app_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>包名（唯一标识）</label>
                        <input type="text" name="bound_id" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <p><label>上架状态</label></p>
                        <label class="radio-item">
                            <input type="radio" name="is_online" value="true" checked>
                            <span>已上架</span>
                        </label>
                        &emsp;
                        <label class="radio-item">
                            <input type="radio" name="is_online" value="false">
                            <span>未上架</span>
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-success" id="submitAddApp">保存</button>
            </div>
        </div>
    </div>
</div>


<!-- 查看弹窗 -->
<div class="modal fade" id="configModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5>应用详情</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <pre id="configText"></pre>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// 查看弹窗
$(".view-config").click(function(){
    let cfg = $(this).data("config");
    $("#configText").text(JSON.stringify(JSON.parse(cfg), null, 2));
    new bootstrap.Modal("#configModal").show();
})

// 新增应用提交
$("#submitAddApp").click(async function(){
    const form = $("#addAppForm");
    const app_name = form.find("[name=app_name]").val();
    const bound_id = form.find("[name=bound_id]").val();
    const is_online = form.find("[name=is_online]:checked").val() === "true";

    if (!app_name || !bound_id) {
        alert("请填写应用名称和包名。");
        return;
    }

    try {
        const res = await fetch("/admin/api/add_app_list", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({app_name, bound_id, is_online})
        });
        const data = await res.json();
        if (res.ok && data.code === 200) {
            alert(data.msg);
            location.reload();
        } else {
            alert(data.msg || "保存失败，请检查输入。");
        }
    } catch (error) {
        console.error(error);
        alert("保存失败，请稍后重试。");
    }
})
</script>
{% endblock %}
