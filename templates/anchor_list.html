{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>主播列表</h2>
    <input class="form-control w-auto" id="searchAnchor" placeholder="搜索主播昵称">
</div>
<hr>
<div class="card">
    <div class="table-responsive">
        <table class="table table-hover table-striped mb-0">
            <thead class="table-dark">
                <tr>
                    <th>主播ID</th>
                    <th>绑定用户ID</th>
                    <th>主播昵称</th>
                    <th>累计收益</th>
                </tr>
            </thead>
            <tbody>
                {% for item in anchor_list %}
                <tr>
                    <td>{{ item.id }}</td>
                    <td>{{ item.user_id }}</td>
                    <td>{{ item.nickname }}</td>
                    <td class="text-success">¥{{ "%.2f"|format(item.income) }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
<script>
$("#searchAnchor").on("input", function(){
    let val = $(this).val().toLowerCase();
    $("tbody tr").each(function(){
        let text = $(this).text().toLowerCase();
        $(this).toggle(text.includes(val));
    })
})
</script>
{% endblock %}
